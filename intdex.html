<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Подарок для Андрея</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: #0a0a1a;
            font-family: 'Arial Black', sans-serif;
            overflow: hidden;
            user-select: none;
        }

        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background: radial-gradient(ellipse at center, #1a1a3e 0%, #0a0a1a 100%);
            z-index: 0;
        }

        #giftButton {
            position: relative;
            z-index: 10;
            padding: 30px 70px;
            font-size: 32px;
            font-weight: 900;
            color: #fff;
            background: linear-gradient(145deg, #ff416c, #ff4b2b);
            border: none;
            border-radius: 80px;
            cursor: pointer;
            box-shadow: 0 0 60px rgba(255, 65, 108, 0.5), 0 20px 40px rgba(0, 0, 0, 0.6);
            transition: transform 0.2s, box-shadow 0.2s;
            text-transform: uppercase;
            letter-spacing: 3px;
            animation: pulse 2s infinite;
        }

        #giftButton:hover {
            transform: scale(1.08);
            box-shadow: 0 0 100px rgba(255, 65, 108, 0.8), 0 20px 50px rgba(0, 0, 0, 0.8);
        }

        #giftButton:active {
            transform: scale(0.95);
        }

        @keyframes pulse {
            0%,
            100% {
                box-shadow: 0 0 60px rgba(255, 65, 108, 0.4);
            }
            50% {
                box-shadow: 0 0 120px rgba(255, 65, 108, 0.8), 0 0 200px rgba(255, 75, 43, 0.3);
            }
        }

        #messageContainer {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 100;
            pointer-events: none;
        }

        #messageContainer.show {
            display: flex;
        }

        #mainMessage {
            font-size: clamp(48px, 12vw, 120px);
            font-weight: 900;
            color: #ff2d55;
            text-shadow:
                0 0 30px rgba(255, 45, 85, 0.9),
                0 0 60px rgba(255, 45, 85, 0.6),
                0 0 120px rgba(255, 45, 85, 0.4),
                0 20px 40px rgba(0, 0, 0, 0.8);
            text-align: center;
            padding: 20px;
            animation: textGlow 1.5s ease-in-out infinite alternate;
            font-family: 'Arial Black', 'Impact', sans-serif;
            letter-spacing: 4px;
            transform: rotate(-2deg);
            background: linear-gradient(180deg, #fff 20%, #ff2d55 80%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            filter: drop-shadow(0 0 40px rgba(255, 0, 50, 0.5));
        }

        @keyframes textGlow {
            0% {
                filter: drop-shadow(0 0 30px rgba(255, 0, 50, 0.4)) scale(1);
            }
            100% {
                filter: drop-shadow(0 0 80px rgba(255, 0, 50, 0.9)) scale(1.05);
            }
        }

        #canvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 5;
            pointer-events: none;
        }

        #audioPlayer {
            display: none;
        }

        @media (max-width: 600px) {
            #giftButton {
                padding: 20px 40px;
                font-size: 22px;
            }
            #mainMessage {
                font-size: clamp(32px, 10vw, 60px);
            }
        }
    </style>
</head>
<body>

    <button id="giftButton">🎁 Нажми, чтобы получить подарок!</button>
    <canvas id="canvas"></canvas>

    <div id="messageContainer">
        <div id="mainMessage">АНДРЕЙ ПОШЕЛ НАХУЙ</div>
    </div>

    <audio id="audioPlayer" loop>
        <source src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3" type="audio/mpeg" />
    </audio>

    <script>
        (function() {
            const audio = document.getElementById('audioPlayer');
            audio.load();
            audio.volume = 1.0;

            const canvas = document.getElementById('canvas');
            const ctx = canvas.getContext('2d');

            let W, H;

            function resize() {
                W = canvas.width = window.innerWidth;
                H = canvas.height = window.innerHeight;
            }
            window.addEventListener('resize', resize);
            resize();

            let particles = [];

            const COLORS = [
                '#FF0A43', '#FFD700', '#FF6B6B', '#4ECDC4', '#FF9F1C',
                '#B980F0', '#FF85A1', '#00D2FF', '#7BED9F', '#F9CA24',
                '#FF4757', '#2ED573', '#1E90FF', '#FF6348', '#A29BFE'
            ];

            class Particle {
                constructor(x, y) {
                    this.x = x;
                    this.y = y;
                    const angle = Math.random() * 2 * Math.PI;
                    const speed = 2 + Math.random() * 9;
                    this.vx = Math.cos(angle) * speed;
                    this.vy = Math.sin(angle) * speed - 2;
                    this.size = 2 + Math.random() * 6;
                    this.color = COLORS[Math.floor(Math.random() * COLORS.length)];
                    this.life = 1;
                    this.decay = 0.008 + Math.random() * 0.025;
                    this.alpha = 1;
                    this.gravity = 0.06 + Math.random() * 0.04;
                    this.trail = [];
                }

                update() {
                    this.trail.push({ x: this.x, y: this.y, alpha: this.alpha });
                    if (this.trail.length > 6) this.trail.shift();

                    this.x += this.vx;
                    this.y += this.vy;
                    this.vy += this.gravity;
                    this.vx *= 0.99;
                    this.vy *= 0.99;

                    this.life -= this.decay;
                    this.alpha = Math.min(this.life, 1);
                    this.size *= 0.998;

                    if (this.life <= 0 || this.size < 0.3 || this.y > H + 50 || this.x < -50 || this.x > W + 50) {
                        this.dead = true;
                    }
                }

                draw() {
                    ctx.save();
                    ctx.globalAlpha = this.alpha;

                    // Хвост
                    for (let i = 0; i < this.trail.length; i++) {
                        const t = this.trail[i];
                        const a = (i / this.trail.length) * this.alpha * 0.4;
                        ctx.globalAlpha = a;
                        ctx.beginPath();
                        ctx.arc(t.x, t.y, this.size * (i / this.trail.length) * 0.7, 0, Math.PI * 2);
                        ctx.fillStyle = this.color;
                        ctx.fill();
                    }

                    // Искра
                    ctx.globalAlpha = this.alpha;
                    ctx.shadowColor = this.color;
                    ctx.shadowBlur = 25;
                    ctx.beginPath();
                    ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                    ctx.fillStyle = this.color;
                    ctx.fill();

                    // Яркое ядро
                    ctx.shadowBlur = 40;
                    ctx.beginPath();
                    ctx.arc(this.x, this.y, this.size * 0.4, 0, Math.PI * 2);
                    ctx.fillStyle = '#FFFFFF';
                    ctx.fill();

                    ctx.restore();
                }
            }

            function createFirework(x, y) {
                const count = 60 + Math.floor(Math.random() * 50);
                for (let i = 0; i < count; i++) {
                    const p = new Particle(x, y);
                    const angle = Math.random() * 2 * Math.PI;
                    const speed = 2 + Math.random() * 8;
                    p.vx = Math.cos(angle) * speed;
                    p.vy = Math.sin(angle) * speed - 2;
                    p.size = 2 + Math.random() * 5;
                    p.decay = 0.008 + Math.random() * 0.02;
                    p.gravity = 0.05 + Math.random() * 0.04;
                    particles.push(p);
                }
            }

            function createCelebration(clickX, clickY) {
                const cx = clickX || W / 2;
                const cy = clickY || H / 2;

                // Первый залп
                createFirework(cx, cy);

                // Второй залп через 300мс
                setTimeout(() => {
                    const cx2 = 100 + Math.random() * (W - 200);
                    const cy2 = 100 + Math.random() * (H * 0.5);
                    createFirework(cx2, cy2);
                }, 300);

                // Третий залп через 600мс
                setTimeout(() => {
                    const cx3 = 100 + Math.random() * (W - 200);
                    const cy3 = 100 + Math.random() * (H * 0.5);
                    createFirework(cx3, cy3);
                }, 600);

                // Четвертый залп через 900мс
                setTimeout(() => {
                    const cx4 = 100 + Math.random() * (W - 200);
                    const cy4 = 100 + Math.random() * (H * 0.5);
                    createFirework(cx4, cy4);
                }, 900);
            }

            function animate() {
                ctx.clearRect(0, 0, W, H);

                for (let i = particles.length - 1; i >= 0; i--) {
                    const p = particles[i];
                    p.update();
                    if (p.dead) {
                        particles.splice(i, 1);
                        continue;
                    }
                    p.draw();
                }

                requestAnimationFrame(animate);
            }

            animate();

            const giftButton = document.getElementById('giftButton');
            const messageContainer = document.getElementById('messageContainer');

            giftButton.addEventListener('click', function(e) {
                const rect = this.getBoundingClientRect();
                const clickX = rect.left + rect.width / 2;
                const clickY = rect.top + rect.height / 2;

                messageContainer.classList.add('show');
                createCelebration(clickX, clickY);

                if (audio.paused) {
                    audio.play().catch(err => console.log('Аудио не заиграло:', err));
                } else {
                    audio.currentTime = 0;
                }

                giftButton.style.transition = 'opacity 0.8s, transform 0.8s';
                giftButton.style.opacity = '0';
                giftButton.style.transform = 'scale(0.5)';
                setTimeout(() => {
                    giftButton.style.display = 'none';
                }, 800);
            });

            // Доп. фейерверк по клику на надпись
            messageContainer.addEventListener('click', function(e) {
                const cx = e.clientX;
                const cy = e.clientY;
                for (let i = 0; i < 40 + Math.random() * 30; i++) {
                    const p = new Particle(cx, cy);
                    const angle = Math.random() * 2 * Math.PI;
                    const speed = 2 + Math.random() * 8;
                    p.vx = Math.cos(angle) * speed;
                    p.vy = Math.sin(angle) * speed - 2;
                    p.size = 2 + Math.random() * 5;
                    p.decay = 0.008 + Math.random() * 0.02;
                    p.gravity = 0.05 + Math.random() * 0.04;
                    particles.push(p);
                }
            });

            console.log('Страница готова! Нажми на кнопку, Андрей...');
        })();
    </script>

</body>
</html>
